stages:
  - build
  - upload_package
  - release
  
variables:
  GIT_DEPTH: "1"
  PACKAGE_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${CI_COMMIT_TAG}/${CI_PROJECT_NAME}.tar.gz"
  
default:
  tags:
    - linux
  
build_job:
  stage: build
  image: $CI_REGISTRY/syntheticedelweiss/image-storage/ubuntu24-qt5-dev:latest
  script:
    - cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS=-w
    - cmake --build build --clean-first
  artifacts:
    paths:
      - bin/
      - lib/
    expire_in: 1 week
    
upload_package_job:
  stage: upload_package
  image: curlimages/curl:latest
  dependencies:
    - build_job # need build artifacts
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - tar -czf ${CI_PROJECT_NAME}.tar.gz bin/ lib/
    # Upload to GitLab Generic Package Registry
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${CI_PROJECT_NAME}.tar.gz" \
           "${PACKAGE_URL}"
    
release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    # release job requires script: section because it just does https://gitlab.com/gitlab-org/gitlab/-/work_items/223856
    - echo "Running the release job."
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release from CI pipeline"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "Project archive (${CI_PROJECT_NAME}.tar.gz)"
          url: "${PACKAGE_URL}"
